services:
  db:
    image: postgres:16-alpine
    container_name: edusync-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jayking46}
      POSTGRES_DB: ${POSTGRES_DB:-edusync_ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-25432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edusync_ai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edusync-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-jayking46}@db:5432/${POSTGRES_DB:-edusync_ai}
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-edusync_ai_super_secret_jwt_key_2026}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-edusync_ai_super_secret_refresh_jwt_key_2026}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edusync-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
